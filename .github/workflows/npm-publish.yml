name: npm-publish

# Publishes @open-rgs/ext-reels to npm on push of a tag matching `v*`.
# Authentication is npm OIDC trusted publishing — no NPM_TOKEN secret.
#
# Trusted Publisher (set at https://www.npmjs.com/package/@open-rgs/ext-reels/access):
#   org/user:    open-rgs
#   repository:  ext-reels
#   workflow:    npm-publish.yml
#   environment: npm-publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      # Required for npm OIDC trusted publishing + provenance attestation.
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2
        with:
          bun-version: latest

      - name: Setup Node (without registry-url — OIDC requires that)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          # Do NOT set registry-url. setup-node would auto-write
          # ~/.npmrc with `_authToken=${NODE_AUTH_TOKEN}` AND export
          # NODE_AUTH_TOKEN=XXXXX-XXXXX-XXXXX-XXXXX as a placeholder.
          # The npm CLI then treats the placeholder as a real token,
          # skips OIDC trusted publishing, and 404s.

      - name: Upgrade npm to a version that supports OIDC trusted publishing
        # Node 22 LTS ships with npm 10.x. Trusted publishing was added
        # in npm 11.5.1. Without this step npm bails with ENEEDAUTH
        # because the older CLI doesn't even attempt the OIDC handshake.
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Publish if version not already on registry
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          if npm view "@open-rgs/ext-reels@$version" version > /dev/null 2>&1; then
            echo "── Skip: @open-rgs/ext-reels@$version already on npm"
          else
            echo "── Publish: @open-rgs/ext-reels@$version ─────────────────"
            npm publish --access public --provenance
          fi
